<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 700" font-family="Inter, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr-down" markerWidth="6" markerHeight="8" refX="3" refY="8" orient="auto">
      <path d="M0,0 L3,8 L6,0 Z" fill="#52a441"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="700" fill="#212529"/>

  <!-- Title bar -->
  <rect width="1100" height="54" fill="#343a40"/>
  <rect y="54" width="1100" height="3" fill="#52a441"/>
