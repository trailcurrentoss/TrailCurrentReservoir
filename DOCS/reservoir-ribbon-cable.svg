  <text x="1076" y="35" text-anchor="end" font-size="10" fill="#6c757d">IDC 2x10 connector</text>

  <!-- Subtitle -->
  <text x="550" y="82" text-anchor="middle" font-size="12" fill="#adb5bd">Flat ribbon cable layout — red stripe marks Pin 1 (3.3V / 5V end)</text>

