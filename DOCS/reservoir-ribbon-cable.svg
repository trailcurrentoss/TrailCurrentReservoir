  <text x="75" y="165" text-anchor="middle" font-size="9" fill="#ffd5d5">Power</text>
  <text x="75" y="290" text-anchor="middle" font-size="8" fill="#ffd5d5">RED STRIPE</text>

  <!-- Pin 2: 5V -->
