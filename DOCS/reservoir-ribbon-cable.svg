  <text x="175" y="165" text-anchor="middle" font-size="9" fill="#adb5bd">Ground</text>

  <!-- Pin 4: GND -->
  <rect x="202" y="108" width="46" height="194" fill="#495057" stroke="#343a40" stroke-width="1" rx="2"/>
  <text x="225" y="130" text-anchor="middle" font-size="12" fill="#dee2e6" font-weight="700">4</text>
  <text x="225" y="148" text-anchor="middle" font-size="10" fill="#dee2e6" font-weight="600">GND</text>
  <text x="225" y="165" text-anchor="middle" font-size="9" fill="#adb5bd">Ground</text>

